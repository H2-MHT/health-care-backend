
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ withdrawal }}</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff; /* Ensure no background color */
        }
        .invoice-box {
            background-color: white;
            border: 1px solid #ddd;
            padding: 30px;
            width: 600px;
            margin: 30px auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
        }
        p {
            font-size: 14px;
            margin: 5px 0;
        }
        .table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        .table td {
            padding: 10px;
            font-size: 14px;
            border-bottom: 1px solid #ddd;
        }
        .table td:first-child {
            font-weight: bold;
            width: 30%;
        }
        .table td:last-child {
            text-align: right;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="invoice-box">
        <h2>{{ withdrawal }}</h2>
        <p><strong>{{ Reference_No }}:</strong> {{ reference }}</p>
        <p><strong>{{ Doctor_ID }}:</strong> {{ doctor_id }}</p>
        <p><strong>{{ Doctor_Name }}:</strong> {{ doctor_name }}</p>
        <p><strong>{{ Date_of_Request }}:</strong> {{ date }}</p>

        <table class="table">
            <tr>
                <td>{{ Amount }}</td>
                <td>{{ amount }}</td>
            </tr>
            <tr>
                <td>{{ Account_No }}</td>
                <td>{{ account_no }}</td>
            </tr>
            <tr>
                <td>IFSC Code</td>
                <td>{{ ifsc }}</td>
            </tr>
            <tr>
                <td>{{ bank }}</td>
                <td>{{ bank_name }}</td>
            </tr>
        </table>

        <div class="footer">
            <p>{{ note }}</p>
            <p>{{ service }}</p>
        </div>
    </div>
</body>
</html>
