trigger:
  branches:
    include:
      - development  # Only trigger on the development branch

pool:
  vmImage: 'ubuntu-latest'

jobs:
  - deployment: DeployToVM
    displayName: web
    environment:
      name: 'staging' 
      resourceType: VirtualMachine
      resourceName: 'Healthcare-backend' 
    strategy:
        runOnce:
          preDeploy:
            steps:
            - checkout: self 
              path: /home/azureuser/testing
              workspaceRepo: false
          deploy:
            steps:
            - task: Bash@3
              inputs:
                targetType: 'inline'
                script: |
                  cd /home/azureuser/testing
                  python3 -m venv venv
                  source venv/bin/activate
                  pip3 install -r requirements.txt
              displayName: 'Install dependencies'