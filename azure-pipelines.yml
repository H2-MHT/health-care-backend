trigger:
  branches:
    include:
      - development  # Only trigger on the development branch

pool:
  vmImage: 'ubuntu-latest'

jobs:
  - deployment: DeployToVM
    displayName: web
    workspace:
      clean: all
    environment:
      name: 'staging' 
      resourceType: VirtualMachine
      resourceName: 'Healthcare-backend' 
    strategy:
        runOnce:
          preDeploy:
            steps:
            - checkout: self 
              workspaceRepo:  true
            -  script: |
                  rm -rf /home/azureuser/testing/*
                  mv $(Build.SourcesDirectory)/*  /home/azureuser/testing/
          deploy:
            steps:
            - task: Bash@3
              inputs:
                targetType: 'inline'
                workingDirectory: /home/azureuser/testing/
                script: |
                  python3 -m venv venv
                  source venv/bin/activate
                  pip3 install -r requirements.txt
              displayName: 'Install dependencies'
            
            - task: Bash@3
              inputs:
                targetType: 'inline'
                workingDirectory: /home/azureuser/testing/
                script: |
                    python manage.py makemigrations
                    python manage.py migrate
              displayName: 'Run Migration scripts'
            